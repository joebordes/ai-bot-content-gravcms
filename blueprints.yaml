name: AI Bot Responder
type: plugin
slug: ai-bot-responder
version: 1.0.0
description: "Detects AI bots and returns a pre-configured structured JSON payload to help them ingest page content accurately."
icon: robot
author:
  name: Joe Bordes
  email: joe@tsolucio.com
homepage: https://github.com/joebordes/ai-bot-content-gravcms
keywords: ai, bot, chatgpt, gemini, crawler, responder, json
bugs: https://github.com/joebordes/ai-bot-content-gravcms
license: MIT

dependencies:
    - { name: grav, version: '>=1.7.0' }

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: Plugin Status
      highlight: 1
      default: 1
      options:
        1: Enabled
        0: Disabled
      validate:
        type: bool

    bots:
      type: text
      label: Bot User-Agent Signatures
      help: "Comma-separated list of User-Agent substrings to match (case-insensitive)."
      placeholder: "gptbot,chatgpt,openai,googlebot,google-agent,gemini,claude..."
      validate:
        required: true

    content:
      type: textarea
      label: AI Bot JSON Content
      help: "The structured JSON payload returned to detected bots."
      rows: 25
      validate:
        required: true
